name: pmlst
owner: iuc
description: Plasmid multi-locus sequence typing for bacterial plasmids.
long_description: |
  pMLST identifies plasmid MLST profiles from assembled genomes or reads using
  the pMLST database from the Center for Genomic Epidemiology. This repository
  contains the pMLST tool wrapper and its offline test fixture.
categories:
  - Sequence Analysis
remote_repository_url: https://github.com/ssi-dk/pmlst
homepage_url: https://github.com/ssi-dk/pmlst
type: unrestricted
